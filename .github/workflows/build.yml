name: Build SmoothSaver

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-xposed-module:
    name: Build Xposed Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Xposed Module
        working-directory: xposed
        run: |
          gradle assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cp xposed/app/build/outputs/apk/release/app-release-unsigned.apk \
             SmoothSaver-Xposed-${{ github.ref_name || 'dev' }}.apk 2>/dev/null || \
          cp xposed/app/build/outputs/apk/release/app-release.apk \
             SmoothSaver-Xposed-${{ github.ref_name || 'dev' }}.apk 2>/dev/null || \
          cp xposed/app/build/outputs/apk/debug/app-debug.apk \
             SmoothSaver-Xposed-${{ github.ref_name || 'dev' }}.apk

      - name: Upload Xposed Module
        uses: actions/upload-artifact@v4
        with:
          name: SmoothSaver-Xposed-Module
          path: SmoothSaver-Xposed-*.apk

  release:
    name: Create Release
    needs: [build-xposed-module]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != 'master' && github.ref_name || 'v1.0.0-dev' }}
          files: |
            SmoothSaver-Xposed-Module/*.apk
          body: |
            ## SmoothSaver ${{ github.ref_name }}
            
            Prevents Battery Saver from forcing 60Hz on Pixel 7.
            
            ### Downloads
            - **SmoothSaver-Xposed-*.apk** — LSPosed module (install + enable in LSPosed)
            
            ### Installation
            See [README](../../blob/master/README.md) for detailed instructions.
          draft: false
          prerelease: false
